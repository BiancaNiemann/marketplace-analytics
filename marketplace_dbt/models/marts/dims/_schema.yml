models:
  - name: dim_users
    description: "Dimension table containing all user attributes, segmentation, and lifetime metrics."
    columns: 
      - name: user_id
        description: "Unique identifier for each user."
        tests:
          - unique
          - not_null  
      - name: signup_at
        description: "The timestamp when the user signed up."
        tests:
          - not_null
      - name: country
        description: "The country of the user."
      - name: city
        description: "The city of the user."
      - name: age_group
        description: "The age group of the user (e.g., '18-24', '25-34', etc.)."
      - name: account_type
        description: "The type of account the user has (e.g., basic, premium)."
      - name: signup_channel
        description: "The channel through which the user signed up (e.g., referral, paid_ads, organic_search, social_media, email, direct)."
      - name: device_type
        description: "The type of device the user primarily uses (e.g., mobile, desktop, tablet)."
      - name: marketing_opt_in
        description: "Boolean flag indicating whether the user has opted in for marketing communications."
      - name: is_verified
        description: "Boolean flag indicating whether the user's email is verified."
      - name: status
        description: "The current status of the user (e.g., active, inactive, suspended)."
      - name: first_seen_at
        description: "The timestamp when the user was first seen on the platform."
      - name: last_seen_at
        description: "The timestamp when the user was last seen on the platform." 
      - name: days_active
        description: "The number of days the user has been active on the platform."
      - name: total_purchases
        description: "The total number of purchases made by the user."
        tests:
          - not_null
      - name: buyer_lifetime_value
        description: "The total revenue generated by the user from purchases."
        tests:
          - not_null
      - name: first_purchase_date
        description: "The timestamp of the user's first purchase."  
      - name: last_purchase_date
        description: "The timestamp of the user's most recent purchase."
      - name: total_listings
        description: "The total number of listings created by the user (if the user is a seller)."
        tests:
          - not_null
      - name: items_sold
        description: "The total number of items sold by the user (if the user is a seller)."
      - name: seller_total_revenue
        description: "The total revenue generated by the user from sales (if the user is a seller)."
      - name: user_segment
        description: "The segment to which the user belongs based on their behavior and characteristics (e.g., inactive, buyer, seller, buyer&seller)."
        tests:
          - accepted_values:
              values: ['Buyer & Seller', 'Buyer Only', 'Seller Only', 'Inactive']
      - name: activity_status
        description: "The activity status of the user based on their recent interactions (e.g., active, at_risk, churned)."
        tests:
          - accepted_values:
              values: ['Active', 'At Risk', 'Churned']
      - name: dbt_updated_at
        description: "The timestamp when the record was last updated in the database."