sources:
  - name: raw
    description: "Raw data ingested from the source system. This data is not transformed and serves as the foundation for all downstream models."
    database: marketplace-analytics-485915
    schema: raw
    tables:

      - name: clicks
        description: "Raw click data from the source system."
        columns:
          - name: click_id
            description: "Unique identifier for each click event."
          - name: impression_id
            description: "Identifier for the impression that generated the click."
          - name: search_id
            description: "Identifier for the search that generated the click."
          - name: user_id
            description: "Identifier for the user who performed the click."
          - name: item_id
            description: "Identifier for the item that was clicked."
          - name: position
            description: "The position of the item in the search results when it was clicked."
          - name: click_date  
            description: "The date when the click event occurred."
          - name: click_ts
            description: "The timestamp when the click event occurred."

      - name: impressions
        description: "Raw impression data from the source system."
        columns:
          - name: impression_id
            description: "Unique identifier for each impression event."
          - name: search_id
            description: "Identifier for the search that generated the impression."
          - name: user_id
            description: "Identifier for the user who was shown the impression."
          - name: item_id
            description: "Identifier for the item that was impressed."
          - name: position
            description: "The position of the item in the search results when it was impressed."
          - name: impression_date
            description: "The date when the impression event occurred."
          - name: timestamp
            description: "The timestamp when the impression event occurred."

      - name: items
        description: "Raw item data from the source system."
        columns:
          - name: item_id
            description: "Unique identifier for each item."
          - name: seller_id
            description: "Identifier for the seller of the item."
            tests:
              - not_null
          - name: title
            description: "The title of the item."
            tests:
              - not_null
          - name: category
            description: "The category of the item."
            tests:
              - not_null
          - name: price
            description: "The price of the item." 
            tests:
              - not_null
          - name: currency
            description: "The currency of the price (e.g., USD, EUR)."
          - name: created_ts
            description: "The timestamp when the item was created."
          - name: listed_date
            description: "The date when the item was listed for sale."
          - name: status
            description: "The status of the item (e.g., active, sold, removed)."
            tests:
              - accepted_values:
                  values: ['active', 'sold', 'removed']

      - name: lifecycle_events
        description: "Raw lifecycle event data from the source system."
        columns:
          - name: event_id
            description: "Unique identifier for each lifecycle event."
          - name: user_id
            description: "Identifier for the user associated with the lifecycle event."
            tests:
              - not_null
          - name: event_type
            description: "The type of lifecycle event (e.g., activation, churn, reactivation)."
            tests:
              - accepted_values:
                  values: ['activation', 'purchase', 'listing_created', 'profile_completed']
          - name: timestamp
            description: "The timestamp when the lifecycle event occurred."
          - name: event_date
            description: "The date when the lifecycle event occurred."

      - name: notifications
        description: "Raw notification data from the source system."
        columns:
          - name: notification_id
            description: "Unique identifier for each notification event."
          - name: user_id
            description: "Identifier for the user associated with the notification event."
            tests:
              - not_null
          - name: type
            description: "The type of notification (e.g., new message, price_drop, promo, reactivation)."
            tests:
              - accepted_values:
                  values: ['new_message', 'price_drop', 'promo', 'reactivation', 'item_sold']
          - name: sent_ts
            description: "The timestamp when the notification event occurred."
          - name: sent_date
            description: "The date when the notification event occurred."
          - name: opened
            description: "Boolean indicating whether the notification was opened by the user."
          - name: channel
            description: "The channel through which the notification was sent (e.g., email, push, SMS)."
            tests:
              - accepted_values:
                  values: ['email', 'push', 'sms']

      - name: purchases
        description: "Raw purchase data from the source system."
        columns:
          - name: purchase_id
            description: "Unique identifier for each purchase event."
          - name: buyer_id
            description: "Identifier for the user who made the purchase."
            tests:
              - not_null
          - name: seller_id
            description: "Identifier for the user who sold the item."
            tests:
              - not_null
          - name: item_id
            description: "Identifier for the item that was purchased."
            tests:
              - not_null
          - name: purchase_amount
            description: "The price at which the item was purchased."
            tests:
              - not_null
          - name: platform_fee
            description: "The fee charged by the platform for facilitating the purchase."
          - name: payment_method
            description: "The payment method used for the purchase (e.g., credit_card, paypal, gift_card)."
            tests:
              - accepted_values:
                  values: ['credit_card', 'paypal', 'google_pay', 'apple_pay']
          - name: currency
            description: "The currency of the purchase amount (e.g., USD, EUR)."
          - name: purchase_ts
            description: "The timestamp when the purchase event occurred."
          - name: purchase_date
            description: "The date when the purchase event occurred."

      - name: search_events
        description: "Raw search event data from the source system."
        columns:
          - name: search_id
            description: "Unique identifier for each search event."
          - name: user_id
            description: "Identifier for the user who performed the search."
            tests:
              - not_null
          - name: query
            description: "The search query entered by the user."
            tests:
              - not_null
          - name: timestamp
            description: "The timestamp when the search event occurred."
          - name: search_date
            description: "The date when the search event occurred."
            
      - name: users
        description: "Raw user data from the source system."
        columns:
          - name: user_id
            description: "Unique identifier for each user."
            tests:
              - unique
              - not_null  
          - name: email
            description: "The email address of the user."
          - name: signup_date
            description: "The date when the user signed up."
          - name: signup_ts
            description: "The timestamp when the user signed up."
          - name: country
            description: "The country of the user."
          - name: city
            description: "The city of the user."
          - name: age_group
            description: "The age group of the user (e.g., 18-24, 25-34, 35-44, etc.)."
          - name: is_seller
            description: "Boolean indicating whether the user is a seller."
          - name: account_type
            description: "The type of user account (e.g., basic, premium)."
            tests:
              - accepted_values:
                  values: ['basic', 'premium']
          - name: signup_channel
            description: "The channel through which the user signed up (e.g., organic, paid, referral)."
            tests:
              - accepted_values:
                  values: ['direct', 'email', 'organic_search', 'paid_ads', 'social_media', 'referral']
          - name: device_type
            description: "The type of device used by the user (e.g., mobile, desktop, tablet)."
            tests:
              - accepted_values:
                  values: ['mobile', 'desktop', 'tablet']
          - name: marketing_opt_in
            description: "Boolean indicating whether the user has opted in for marketing communications."
          - name: is_verified
            description: "Boolean indicating whether the user's email or phone number is verified."
          - name: status
            description: "The status of the user account (e.g., active, inactive, suspended)."
            tests:
              - accepted_values:
                  values: ['active', 'inactive', 'suspended']