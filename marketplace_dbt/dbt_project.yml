name: 'marketplace_dbt'
version: '1.0.0'

profile: 'marketplace_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  marketplace_dbt:
    staging:
       +materialized: view
       +schema: staging

    # Marts layer
    marts:
      # Dimension tables
      dims:
        +materialized: table
        +schema: marts
      
      facts:
       +materialized: table
       +schema: marts 